<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>White Board History - Byzantium Pilot Assets</title>
  <rect width="1600" height="900" fill="#ffffff"/>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <style>
      .card{fill:#ffffff;stroke:#e5e7eb;stroke-width:2;filter:url(#soft-shadow)}
      .ink{stroke:#111111;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#111111;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .label{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:750;fill:#111111;text-anchor:middle}
      .small{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:650;fill:#6b7280;text-anchor:middle;letter-spacing:0.6px}
    </style>
  </defs>

  <g id="constantinople-wall-piece" transform="translate(235 155)">
    <rect class="card" x="-170" y="-112" width="340" height="250" rx="20"/>
    <path d="M-122 76 V-46 H-90 V-78 H-46 V-46 H-4 V-78 H40 V-46 H84 V-78 H124 V76 Z" fill="#ffffff" class="ink"/>
    <path d="M-94 -4 H94 M-94 36 H94 M-54 -40 V76 M32 -40 V76" fill="none" class="thin"/>
    <path d="M-124 88 C-60 68 6 108 78 84 C104 76 124 78 146 88" fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
    <text class="label" x="0" y="124">Constantinople Wall</text>
  </g>

  <g id="bosporus-channel" transform="translate(650 155)">
    <rect class="card" x="-185" y="-112" width="370" height="250" rx="20"/>
    <path d="M-125 -78 C-20 -38 -74 15 18 40 C78 56 68 100 130 86" fill="none" stroke="#2563eb" stroke-width="20" stroke-linecap="round" opacity="0.18"/>
    <path d="M-125 -78 C-20 -38 -74 15 18 40 C78 56 68 100 130 86" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <path d="M-84 -2 C-42 -28 4 -8 40 -32 M-44 72 C-5 50 50 80 92 58" fill="none" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
    <text class="label" x="0" y="124">Bosporus</text>
  </g>

  <g id="ottoman-cannon-battery" transform="translate(1060 155)">
    <rect class="card" x="-180" y="-112" width="360" height="250" rx="20"/>
    <g transform="translate(-56 0)">
      <path d="M-66 8 L42 -32 L58 -10 L-50 32 Z" fill="#ffffff" class="ink"/>
      <circle cx="-42" cy="42" r="19" fill="#ffffff" class="ink"/>
      <circle cx="36" cy="42" r="19" fill="#ffffff" class="ink"/>
      <path d="M70 -14 H100" fill="none" class="ink"/>
      <path d="M110 -14 C132 -30 132 2 110 -14" fill="none" stroke="#dc2626" stroke-width="5"/>
    </g>
    <path d="M-132 80 H132" fill="none" class="thin"/>
    <text class="label" x="0" y="124">Cannon Battery</text>
  </g>

  <g id="venetian-relief-ships" transform="translate(1400 155)">
    <rect class="card" x="-135" y="-112" width="270" height="250" rx="20"/>
    <g transform="translate(-42 -8) scale(0.72)">
      <path d="M-96 34 C-64 76 58 76 102 34 Z" fill="#ffffff" class="ink"/>
      <path d="M-38 34 V-72 M-38 -68 L46 -18 L-38 14 Z" fill="#ffffff" class="ink"/>
    </g>
    <g transform="translate(52 20) scale(0.55)">
      <path d="M-96 34 C-64 76 58 76 102 34 Z" fill="#ffffff" class="ink"/>
      <path d="M-38 34 V-72 M-38 -68 L46 -18 L-38 14 Z" fill="#ffffff" class="ink"/>
    </g>
    <path d="M-112 74 C-54 52 0 88 58 68 C86 58 108 60 126 72" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
    <text class="label" x="0" y="124">Relief Ships</text>
  </g>

  <g id="byzantine-treasury-meter" transform="translate(265 470)">
    <rect class="card" x="-200" y="-112" width="400" height="250" rx="20"/>
    <rect x="-126" y="-26" width="252" height="44" rx="22" fill="#ffffff" class="ink"/>
    <rect x="-119" y="-19" width="74" height="30" rx="15" fill="#7c3aed" opacity="0.8"/>
    <path d="M-126 42 H126" fill="none" class="thin"/>
    <text class="small" x="-84" y="68">EMPTY</text>
    <text class="small" x="86" y="68">FULL</text>
    <text class="label" x="0" y="124">Treasury Meter</text>
  </g>

  <g id="manpower-meter" transform="translate(715 470)">
    <rect class="card" x="-200" y="-112" width="400" height="250" rx="20"/>
    <g transform="translate(-78 -2)">
      <circle cx="0" cy="-18" r="12" fill="#ffffff" class="ink"/>
      <path d="M0 -4 V34 M-22 10 H22" fill="none" class="ink"/>
    </g>
    <g transform="translate(0 -2)" opacity="0.42">
      <circle cx="0" cy="-18" r="12" fill="#ffffff" class="ink"/>
      <path d="M0 -4 V34 M-22 10 H22" fill="none" class="ink"/>
    </g>
    <g transform="translate(78 -2)" opacity="0.18">
      <circle cx="0" cy="-18" r="12" fill="#ffffff" class="ink"/>
      <path d="M0 -4 V34 M-22 10 H22" fill="none" class="ink"/>
    </g>
    <text class="label" x="0" y="124">Manpower Meter</text>
  </g>

  <g id="eastern-mediterranean-map" transform="translate(1235 475)">
    <rect class="card" x="-260" y="-142" width="520" height="310" rx="22"/>
    <path d="M-190 -28 C-148 -104 -70 -86 -44 -126 C4 -90 48 -104 84 -40 C138 -28 120 58 48 42 C14 86 -64 72 -84 18 C-140 42 -212 18 -190 -28 Z" fill="#ffffff" class="ink"/>
    <path d="M68 -22 C104 -60 156 -38 184 -72 C226 -36 208 40 154 42 C120 66 88 40 68 -22 Z" fill="#ffffff" class="ink"/>
    <path d="M-48 -18 C-2 18 50 4 88 -26" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-37" cy="-20" r="8" fill="#7c3aed"/>
    <circle cx="78" cy="-28" r="8" fill="#dc2626"/>
    <text class="label" x="0" y="154">Eastern Mediterranean Map</text>
  </g>

  <g id="verdict-impossible-card" transform="translate(800 765)">
    <rect class="card" x="-320" y="-82" width="640" height="150" rx="22"/>
    <circle cx="-250" cy="-18" r="34" fill="#111111"/>
    <path d="M-264 -18 H-236" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <path d="M-180 -40 H235 M-180 -6 H140" fill="none" class="thin"/>
    <text class="label" x="40" y="42">Verdict: Possible, But Too Late</text>
  </g>
</svg>
