<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>White Board History - Polished Historical Objects</title>
  <rect width="1600" height="900" fill="#ffffff"/>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <style>
      .card{fill:#ffffff;stroke:#e5e7eb;stroke-width:2;filter:url(#soft-shadow)}
      .ink{stroke:#111111;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#111111;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .label{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:750;fill:#111111;text-anchor:middle}
      .small{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:650;fill:#6b7280;text-anchor:middle;letter-spacing:0.6px}
    </style>
  </defs>

  <g id="infantry-token" transform="translate(130 125)">
    <rect class="card" x="-92" y="-92" width="184" height="218" rx="18"/>
    <circle cx="0" cy="-36" r="18" fill="#ffffff" class="ink"/>
    <path d="M0 -16 V38 M-32 0 H32 M-20 74 L0 38 L20 74" fill="none" class="ink"/>
    <path d="M38 -40 V74 M38 -40 L72 -22 L38 -4" fill="none" class="thin"/>
    <text class="label" x="0" y="104">Infantry</text>
  </g>

  <g id="cavalry-token" transform="translate(360 125)">
    <rect class="card" x="-102" y="-92" width="204" height="218" rx="18"/>
    <path d="M-72 36 C-38 -20 38 -28 76 22 L58 56 H-50 Z" fill="#ffffff" class="ink"/>
    <path d="M-42 56 V84 M48 56 V84 M-2 56 V84" fill="none" class="ink"/>
    <circle cx="-24" cy="-22" r="14" fill="#ffffff" class="ink"/>
    <path d="M-18 -7 L4 30 M-62 35 L-88 12" fill="none" class="thin"/>
    <text class="label" x="0" y="104">Cavalry</text>
  </g>

  <g id="cannon" transform="translate(605 125)">
    <rect class="card" x="-122" y="-92" width="244" height="218" rx="18"/>
    <path d="M-72 8 L40 -34 L58 -10 L-54 34 Z" fill="#ffffff" class="ink"/>
    <circle cx="-45" cy="45" r="21" fill="#ffffff" class="ink"/>
    <circle cx="39" cy="45" r="21" fill="#ffffff" class="ink"/>
    <path d="M72 -14 H104" fill="none" class="ink"/>
    <path d="M114 -14 C138 -32 138 4 114 -14" fill="none" stroke="#dc2626" stroke-width="5"/>
    <text class="label" x="0" y="104">Cannon</text>
  </g>

  <g id="galley-ship" transform="translate(870 125)">
    <rect class="card" x="-122" y="-92" width="244" height="218" rx="18"/>
    <path d="M-96 34 C-64 76 58 76 102 34 Z" fill="#ffffff" class="ink"/>
    <path d="M-38 34 V-72 M-38 -68 L46 -18 L-38 14 Z" fill="#ffffff" class="ink"/>
    <path d="M-80 52 H82 M-64 68 H50" fill="none" class="thin"/>
    <path d="M-100 78 C-48 62 -2 94 44 78 C72 68 92 70 112 80" fill="none" stroke="#6b7280" stroke-width="4" stroke-linecap="round"/>
    <text class="label" x="0" y="104">Galley</text>
  </g>

  <g id="wall-segment" transform="translate(1160 125)">
    <rect class="card" x="-130" y="-92" width="260" height="218" rx="18"/>
    <path d="M-98 70 V-40 H-70 V-68 H-34 V-40 H2 V-68 H38 V-40 H74 V-68 H108 V70 Z" fill="#ffffff" class="ink"/>
    <path d="M-76 0 H84 M-76 36 H84 M-38 -36 V70 M34 -36 V70" fill="none" class="thin"/>
    <text class="label" x="0" y="104">Wall</text>
  </g>

  <g id="coin-stack" transform="translate(1405 125)">
    <rect class="card" x="-108" y="-92" width="216" height="218" rx="18"/>
    <ellipse cx="0" cy="-32" rx="62" ry="19" fill="#ffffff" class="ink"/>
    <path d="M-62 -32 V38 C-62 49 -34 60 0 60 C34 60 62 49 62 38 V-32" fill="#ffffff" class="ink"/>
    <path d="M-62 -4 C-62 7 -34 18 0 18 C34 18 62 7 62 -4 M-62 24 C-62 35 -34 46 0 46 C34 46 62 35 62 24" fill="none" class="thin"/>
    <text class="label" x="0" y="104">Coins</text>
  </g>

  <g id="grain" transform="translate(130 405)">
    <rect class="card" x="-92" y="-98" width="184" height="224" rx="18"/>
    <path d="M0 76 V-76" fill="none" class="ink"/>
    <path d="M0 -52 C-38 -64 -38 -22 0 -28 C38 -64 38 -22 0 -28" fill="#ffffff" class="thin"/>
    <path d="M0 -16 C-38 -28 -38 14 0 8 C38 -28 38 14 0 8" fill="#ffffff" class="thin"/>
    <path d="M0 20 C-38 8 -38 50 0 44 C38 8 38 50 0 44" fill="#ffffff" class="thin"/>
    <text class="label" x="0" y="104">Grain</text>
  </g>

  <g id="crown" transform="translate(360 405)">
    <rect class="card" x="-102" y="-98" width="204" height="224" rx="18"/>
    <path d="M-74 52 L-58 -42 L-18 14 L0 -56 L18 14 L58 -42 L74 52 Z" fill="#ffffff" class="ink"/>
    <path d="M-62 52 H62 M-38 25 H38" fill="none" class="thin"/>
    <circle cx="-58" cy="-42" r="7" fill="#111111"/>
    <circle cx="0" cy="-56" r="7" fill="#111111"/>
    <circle cx="58" cy="-42" r="7" fill="#111111"/>
    <text class="label" x="0" y="104">Crown</text>
  </g>

  <g id="treaty-scroll" transform="translate(605 405)">
    <rect class="card" x="-112" y="-98" width="224" height="224" rx="18"/>
    <path d="M-66 -66 H50 C76 -66 76 -22 50 -22 H-44 C-72 -22 -72 25 -44 25 H68" fill="#ffffff" class="ink"/>
    <path d="M50 -66 C27 -66 27 -22 50 -22 M-44 25 C-18 25 -18 72 -44 72 H68 C96 72 96 25 68 25" fill="none" class="thin"/>
    <path d="M-22 -48 H24 M-26 -2 H38 M-12 49 H32" fill="none" class="thin"/>
    <text class="label" x="0" y="104">Treaty</text>
  </g>

  <g id="city-node" transform="translate(870 405)">
    <rect class="card" x="-112" y="-98" width="224" height="224" rx="18"/>
    <circle r="70" fill="#ffffff" class="ink"/>
    <path d="M-42 34 V-8 H-20 V-34 H8 V-8 H38 V34 Z" fill="#ffffff" class="ink"/>
    <path d="M-26 34 V15 H-10 V34 M14 34 V12 H30 V34" fill="none" class="thin"/>
    <text class="label" x="0" y="104">City</text>
  </g>

  <g id="war-marker" transform="translate(1160 405)">
    <rect class="card" x="-112" y="-98" width="224" height="224" rx="18"/>
    <path d="M-70 -68 L66 68 M70 -68 L-66 68" fill="none" class="ink"/>
    <path d="M-86 -84 L-52 -50 M86 -84 L52 -50 M-84 86 L-48 50 M84 86 L48 50" fill="none" class="thin"/>
    <circle r="32" fill="#ffffff" class="ink"/>
    <text class="label" x="0" y="104">War</text>
  </g>

  <g id="magnifier" transform="translate(1405 405)">
    <rect class="card" x="-108" y="-98" width="216" height="224" rx="18"/>
    <circle cx="-18" cy="-18" r="50" fill="#ffffff" class="ink"/>
    <path d="M20 20 L82 82" fill="none" class="ink"/>
    <path d="M-42 -18 H4 M-18 -42 V4" fill="none" class="thin"/>
    <text class="label" x="0" y="104">Explain</text>
  </g>

  <g id="map-land" transform="translate(290 710)">
    <rect class="card" x="-188" y="-95" width="376" height="210" rx="20"/>
    <path d="M-116 -14 C-86 -70 -28 -48 -10 -82 C20 -56 58 -66 86 -18 C126 -8 102 54 50 43 C24 76 -34 64 -50 26 C-96 40 -132 16 -116 -14 Z" fill="#ffffff" class="ink"/>
    <circle cx="-18" cy="-7" r="9" fill="#111111"/>
    <path d="M-18 -7 C8 18 44 15 72 -5" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round"/>
    <text class="label" x="0" y="94">Map Land</text>
  </g>

  <g id="sea-route" transform="translate(800 710)">
    <rect class="card" x="-210" y="-95" width="420" height="210" rx="20"/>
    <path d="M-150 30 C-84 0 -10 62 100 8" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" stroke-dasharray="16 14"/>
    <path d="M-34 -8 C-14 22 44 22 70 -8 Z" fill="#ffffff" class="ink"/>
    <path d="M2 -8 V-60 L44 -18 L2 -18" fill="#ffffff" class="thin"/>
    <text class="label" x="0" y="94">Sea Route</text>
  </g>

  <g id="debt-meter" transform="translate(1290 710)">
    <rect class="card" x="-220" y="-95" width="440" height="210" rx="20"/>
    <path d="M-150 48 C-96 -70 -12 -70 0 16 C18 92 102 80 150 -50" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
    <path d="M-150 58 H150 M-150 58 V-70" fill="none" class="thin"/>
    <text class="small" x="-125" y="80">DEBT</text>
    <text class="label" x="0" y="94">Crisis Graph</text>
  </g>
</svg>
