<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>White Board History - Polished Map Annotations</title>
  <rect width="1600" height="900" fill="#ffffff"/>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <style>
      .card{fill:#ffffff;stroke:#e5e7eb;stroke-width:2;filter:url(#soft-shadow)}
      .ink{stroke:#111111;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#111111;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .muted{stroke:#6b7280;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .label{font-family:Inter,Arial,sans-serif;font-size:25px;font-weight:750;fill:#111111;text-anchor:middle}
      .small{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:650;fill:#6b7280;text-anchor:middle;letter-spacing:0.6px}
    </style>
    <marker id="arrow-head" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2.5 2.5 L11 7 L2.5 11.5 Z" fill="#111111"/>
    </marker>
    <marker id="red-arrow-head" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2.5 2.5 L11 7 L2.5 11.5 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <g id="attack-arrow" transform="translate(285 145)">
    <rect class="card" x="-210" y="-100" width="420" height="230" rx="20"/>
    <path d="M-145 58 C-64 -68 70 -60 150 10" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
    <path d="M150 10 L126 1 L138 -13 Z" fill="#dc2626"/>
    <circle cx="-145" cy="58" r="8" fill="#dc2626"/>
    <text class="label" x="0" y="105">Attack Arrow</text>
  </g>

  <g id="trade-route" transform="translate(800 145)">
    <rect class="card" x="-250" y="-100" width="500" height="230" rx="20"/>
    <path d="M-190 55 C-105 -20 -42 112 50 34 C106 -12 162 5 205 54" fill="none" class="ink" stroke-dasharray="16 16" marker-end="url(#arrow-head)"/>
    <circle cx="-190" cy="55" r="9" fill="#111111"/>
    <circle cx="205" cy="54" r="9" fill="#111111"/>
    <text class="label" x="0" y="105">Trade Route</text>
  </g>

  <g id="siege-ring" transform="translate(1295 145)">
    <rect class="card" x="-150" y="-100" width="300" height="230" rx="20"/>
    <circle r="68" fill="none" stroke="#dc2626" stroke-width="6" stroke-dasharray="16 13"/>
    <circle r="31" fill="#ffffff" class="ink"/>
    <path d="M-16 0 H16 M0 -16 V16" fill="none" class="thin"/>
    <text class="label" x="0" y="105">Siege Ring</text>
  </g>

  <g id="contested-border" transform="translate(300 410)">
    <rect class="card" x="-225" y="-92" width="450" height="210" rx="20"/>
    <path d="M-170 -8 C-112 -50 -50 45 18 2 C96 -44 143 26 190 -20" fill="none" class="muted" stroke-dasharray="12 13"/>
    <path d="M-170 42 C-104 8 -44 70 24 34 C102 -6 144 58 190 20" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
    <text class="label" x="0" y="88">Contested Border</text>
  </g>

  <g id="timeline" transform="translate(810 410)">
    <rect class="card" x="-250" y="-92" width="500" height="210" rx="20"/>
    <path d="M-190 8 H190" fill="none" class="ink" marker-end="url(#arrow-head)"/>
    <g transform="translate(-115 8)">
      <circle r="13" fill="#ffffff" class="ink"/>
      <text class="small" x="0" y="45">1396</text>
    </g>
    <g transform="translate(0 8)">
      <circle r="13" fill="#ffffff" class="ink"/>
      <text class="small" x="0" y="45">1444</text>
    </g>
    <g transform="translate(115 8)">
      <circle r="13" fill="#ffffff" class="ink"/>
      <text class="small" x="0" y="45">1453</text>
    </g>
    <text class="label" x="0" y="88">Timeline</text>
  </g>

  <g id="cause-effect-card" transform="translate(1300 410)">
    <rect class="card" x="-230" y="-92" width="460" height="210" rx="20"/>
    <rect x="-190" y="-38" width="150" height="70" rx="12" fill="#ffffff" class="ink"/>
    <rect x="40" y="-38" width="150" height="70" rx="12" fill="#ffffff" class="ink"/>
    <path d="M-28 -3 H28" fill="none" class="ink" marker-end="url(#arrow-head)"/>
    <circle cx="-115" cy="-3" r="15" fill="#111111" opacity="0.08"/>
    <circle cx="115" cy="-3" r="15" fill="#111111" opacity="0.08"/>
    <text class="label" x="0" y="88">Cause To Effect</text>
  </g>

  <g id="pressure-meter" transform="translate(315 690)">
    <rect class="card" x="-235" y="-105" width="470" height="220" rx="20"/>
    <rect x="-165" y="-22" width="330" height="42" rx="21" fill="#ffffff" class="ink"/>
    <rect x="-158" y="-15" width="230" height="28" rx="14" fill="#dc2626" opacity="0.86"/>
    <path d="M-165 42 H165" fill="none" class="thin"/>
    <text class="small" x="-122" y="68">LOW</text>
    <text class="small" x="120" y="68">HIGH</text>
    <text class="label" x="0" y="100">Pressure Meter</text>
  </g>

  <g id="verdict-card" transform="translate(815 690)">
    <rect class="card" x="-220" y="-105" width="440" height="220" rx="20"/>
    <rect x="-150" y="-58" width="300" height="112" rx="14" fill="#ffffff" class="ink"/>
    <path d="M-112 -18 H90 M-112 18 H34" fill="none" class="thin"/>
    <circle cx="110" cy="18" r="28" fill="#111111"/>
    <path d="M98 18 L107 29 L124 4" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="label" x="0" y="100">Verdict Card</text>
  </g>

  <g id="focus-spotlight" transform="translate(1285 690)">
    <rect class="card" x="-185" y="-105" width="370" height="220" rx="20"/>
    <circle r="70" fill="#111111" opacity="0.06"/>
    <circle r="42" fill="#ffffff" class="ink"/>
    <path d="M-18 0 H18 M0 -18 V18" fill="none" class="thin"/>
    <text class="label" x="0" y="100">Focus Marker</text>
  </g>
</svg>
