<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <title>White Board History - Polished Faction Tokens</title>
  <rect width="1600" height="900" fill="#ffffff"/>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <style>
      .card{fill:#ffffff;stroke:#e5e7eb;stroke-width:2;filter:url(#soft-shadow)}
      .ink{stroke:#111111;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#111111;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
      .label{font-family:Inter,Arial,sans-serif;font-size:25px;font-weight:750;fill:#111111;text-anchor:middle}
      .small{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:650;fill:#6b7280;text-anchor:middle;letter-spacing:0.6px}
    </style>
  </defs>

  <g id="byzantium-token" transform="translate(130 110)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="58" fill="#ffffff" class="ink"/>
    <circle r="48" fill="#7c3aed" opacity="0.12"/>
    <circle r="34" fill="none" stroke="#7c3aed" stroke-width="6"/>
    <path d="M-24 3 H24 M0 -24 V30 M-15 -12 H15" fill="none" class="thin"/>
    <text class="label" x="0" y="96">Byzantium</text>
    <text class="small" x="0" y="119">PURPLE</text>
  </g>

  <g id="ottoman-token" transform="translate(365 110)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="58" fill="#ffffff" class="ink"/>
    <circle r="48" fill="#dc2626" opacity="0.12"/>
    <path d="M18 -30 A36 36 0 1 0 18 30 A25 25 0 1 1 18 -30" fill="#dc2626"/>
    <circle cx="33" cy="0" r="6" fill="#dc2626"/>
    <text class="label" x="0" y="96">Ottomans</text>
    <text class="small" x="0" y="119">RED</text>
  </g>

  <g id="venice-token" transform="translate(600 110)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="58" fill="#ffffff" class="ink"/>
    <circle r="48" fill="#0f766e" opacity="0.12"/>
    <path d="M-34 22 C-18 -20 18 -20 34 22" fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round"/>
    <path d="M-28 23 H28 M-17 8 H17 M0 -16 V32" fill="none" class="thin"/>
    <text class="label" x="0" y="96">Venice</text>
    <text class="small" x="0" y="119">TEAL</text>
  </g>

  <g id="castile-token" transform="translate(835 110)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="58" fill="#ffffff" class="ink"/>
    <circle r="48" fill="#f59e0b" opacity="0.14"/>
    <path d="M-29 -22 H29 V32 H-29 Z" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linejoin="round"/>
    <path d="M-20 -22 V-38 H-5 V-22 M5 -22 V-38 H20 V-22 M-15 32 V10 H15 V32" fill="none" class="thin"/>
    <text class="label" x="0" y="96">Castile</text>
    <text class="small" x="0" y="119">GOLD</text>
  </g>

  <g id="france-token" transform="translate(1070 110)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="58" fill="#ffffff" class="ink"/>
    <circle r="48" fill="#2563eb" opacity="0.12"/>
    <path d="M0 -38 C-24 -10 -22 19 0 39 C22 19 24 -10 0 -38 Z" fill="#2563eb"/>
    <path d="M0 -19 C-11 -6 -10 10 0 24 C10 10 11 -6 0 -19 Z" fill="#ffffff"/>
    <text class="label" x="0" y="96">France</text>
    <text class="small" x="0" y="119">BLUE</text>
  </g>

  <g id="ming-token" transform="translate(1305 110)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="58" fill="#ffffff" class="ink"/>
    <circle r="48" fill="#b91c1c" opacity="0.12"/>
    <path d="M-34 10 L0 -36 L34 10 L20 35 H-20 Z" fill="none" stroke="#b91c1c" stroke-width="6" stroke-linejoin="round"/>
    <path d="M-18 9 H18 M-8 -6 H8 M0 -22 V27" fill="none" class="thin"/>
    <text class="label" x="0" y="96">Ming</text>
    <text class="small" x="0" y="119">CRIMSON</text>
  </g>

  <g id="aztec-token" transform="translate(130 390)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="58" fill="#ffffff" class="ink"/>
    <circle r="48" fill="#16a34a" opacity="0.12"/>
    <path d="M0 -41 L12 -12 L44 -12 L18 7 L28 38 L0 20 L-28 38 L-18 7 L-44 -12 L-12 -12 Z" fill="#16a34a"/>
    <text class="label" x="0" y="96">Aztec</text>
    <text class="small" x="0" y="119">GREEN</text>
  </g>

  <g id="neutral-token" transform="translate(365 390)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="58" fill="#ffffff" class="ink"/>
    <circle r="48" fill="#111111" opacity="0.07"/>
    <path d="M-29 0 H29 M0 -29 V29" fill="none" class="ink"/>
    <text class="label" x="0" y="96">Neutral</text>
    <text class="small" x="0" y="119">INK</text>
  </g>

  <g id="capital-marker" transform="translate(600 390)">
    <rect class="card" x="-90" y="-92" width="180" height="232" rx="18"/>
    <path d="M0 -58 C32 -58 58 -32 58 0 C58 43 0 84 0 84 C0 84 -58 43 -58 0 C-58 -32 -32 -58 0 -58 Z" fill="#ffffff" class="ink"/>
    <circle r="22" fill="#111111"/>
    <circle r="8" fill="#ffffff"/>
    <text class="label" x="0" y="116">Capital</text>
  </g>

  <g id="flag-marker" transform="translate(835 390)">
    <rect class="card" x="-90" y="-92" width="180" height="232" rx="18"/>
    <path d="M-44 70 V-58" fill="none" class="ink"/>
    <path d="M-42 -54 H52 L32 -17 H-42 Z" fill="#ffffff" class="ink"/>
    <path d="M-28 -41 H22" fill="none" class="thin"/>
    <circle cx="-44" cy="70" r="9" fill="#111111"/>
    <text class="label" x="0" y="116">Flag</text>
  </g>

  <g id="event-pin" transform="translate(1070 390)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <circle r="56" fill="#ffffff" class="ink"/>
    <path d="M0 -30 V8" fill="none" class="ink"/>
    <circle cx="0" cy="29" r="5" fill="#111111"/>
    <text class="label" x="0" y="96">Event</text>
    <text class="small" x="0" y="119">CALLOUT</text>
  </g>

  <g id="province-marker" transform="translate(1305 390)">
    <rect class="card" x="-90" y="-82" width="180" height="212" rx="18"/>
    <path d="M-48 -22 C-35 -52 -2 -40 14 -58 C32 -40 58 -38 62 -6 C82 10 58 44 24 34 C4 62 -34 48 -36 20 C-62 24 -72 -2 -48 -22 Z" fill="#ffffff" class="ink"/>
    <circle cx="8" cy="-6" r="9" fill="#111111"/>
    <text class="label" x="0" y="96">Province</text>
    <text class="small" x="0" y="119">MAP PIECE</text>
  </g>

  <g id="faction-palette" transform="translate(150 680)">
    <text class="label" x="575" y="-34">Accent Swatches</text>
    <rect class="card" x="-34" y="-10" width="1218" height="120" rx="18"/>
    <rect x="0" y="20" width="110" height="48" rx="10" fill="#7c3aed"/>
    <rect x="150" y="20" width="110" height="48" rx="10" fill="#dc2626"/>
    <rect x="300" y="20" width="110" height="48" rx="10" fill="#0f766e"/>
    <rect x="450" y="20" width="110" height="48" rx="10" fill="#f59e0b"/>
    <rect x="600" y="20" width="110" height="48" rx="10" fill="#2563eb"/>
    <rect x="750" y="20" width="110" height="48" rx="10" fill="#b91c1c"/>
    <rect x="900" y="20" width="110" height="48" rx="10" fill="#16a34a"/>
    <rect x="1050" y="20" width="110" height="48" rx="10" fill="#111111"/>
    <text class="small" x="575" y="92">One accent per faction. Everything else stays white, black, and gray.</text>
  </g>
</svg>
